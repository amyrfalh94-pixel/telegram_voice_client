name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build autoconf libtool pkg-config zip unzip
      - name: Cache Buildozer, pip, Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.cache/pip
            ~/.gradle
          key: ${{ runner.os }}-buildozer-${{ hashFiles('python_app/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      - name: Build C++ Engine
        run: |
          cd audio_engine_cpp && mkdir build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DANDROID_NATIVE_API_LEVEL=21 -DCMAKE_BUILD_TYPE=Release
          cmake --build .
          mkdir -p ../../python_app/jniLibs/arm64-v8a
          cp libaudio_engine_cpp.so ../../python_app/jniLibs/arm64-v8a/
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: cd python_app && pip install buildozer cython
      - name: Accept Android licenses
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;34.0.0"
          mkdir -p $ANDROID_HOME/tools/bin
          ln -sf $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
      - name: Build APK
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
        run: |
          cd python_app
          buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: voice-client-apk
          path: python_app/bin/*.apk
